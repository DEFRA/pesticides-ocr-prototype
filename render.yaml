# Render Blueprint — off-CDP hosting for external user research.
#
# Deploys the GOV.UK Prototype Kit app using the existing Dockerfile.
# The prototype stays PASSWORD protected via the kit's PASSWORD env var, so it
# meets GDS guidance (published prototypes must be password-protected and must
# not be mistaken for a real service).
#
# Setup: in Render, "New +" > "Blueprint", connect this repo, and Render reads
# this file. During apply you'll be prompted to enter the PASSWORD value
# (it is intentionally not stored in git — sync: false).
services:
  - type: web
    name: pesticides-ocr-prototype
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    envVars:
      # Basic-auth password for the prototype. Set the value in the Render
      # dashboard (Environment tab) — do NOT commit it.
      - key: PASSWORD
        sync: false
